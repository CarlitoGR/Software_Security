<!DOCTYPE html>
<html>
<head>
    <title>Patient Search</title>
</head>
<body>
    <h1>Patient Search</h1>

    <p>Welcome, {{ username }}.</p>

    <form method="get" action="/patient-search">
        <label>Search by patient name</label><br>
        <input type="text" name="q" value="{{ query }}"><br><br>

        <button type="submit">Search</button>
    </form>

    {% if query %}
        <h2>Search Results</h2>
        <p>Search placeholder for: <strong>{{ query }}</strong></p>
        <p>TODO(team-search): connect this page to the patient database.</p>
    {% endif %}

    <br>
    <a href="/dashboard">Back to Dashboard</a>
</body>
</html>
