services:
  web:
    build: .
    container_name: patient_portal_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: patient_portal_db
    environment:
      POSTGRES_DB: patient_portal
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patient_user -d patient_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
